<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업적 실시간 체커</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #090b0e;
    --surface:  #10131a;
    --surface2: #161b24;
    --border:   #252a35;
    --gold:     #c8993a;
    --gold-dim: rgba(200,153,58,.15);
    --green:    #3ecf6e;
    --green-bg: rgba(62,207,110,.1);
    --red:      #e05555;
    --red-bg:   rgba(224,85,85,.1);
    --blue:     #4a9fd4;
    --text:     #ccc9be;
    --muted:    #585c68;
    --radius:   4px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    height: 100vh;
    display: grid;
    grid-template-rows: 52px 1fr;
    grid-template-columns: 1fr 340px;
    overflow: hidden;
  }

  /* ── 헤더 ── */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, rgba(200,153,58,.07) 0%, transparent 60%);
  }
  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }
  .header-sep { flex: 1; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  .status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 1.4s infinite; }
  .status-dot.ocr  { background: var(--gold);  box-shadow: 0 0 6px var(--gold); }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }
  .status-label { font-size: 12px; color: var(--muted); letter-spacing: .5px; }

  .btn {
    padding: 6px 16px;
    border-radius: var(--radius);
    border: none;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: filter .15s;
  }
  .btn:hover { filter: brightness(1.15); }
  .btn-primary { background: var(--gold); color: #08090b; }
  .btn-danger  { background: #3a1818; color: var(--red); border: 1px solid #5a2020; }
  .btn:disabled { opacity: .4; pointer-events: none; }

  .panel-preview {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-title {
    padding: 10px 16px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .preview-container {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #06080b;
  }
  #previewCanvas {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: none;
  }
  .preview-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: var(--muted);
    font-size: 13px;
  }
  .preview-placeholder .icon { font-size: 40px; opacity: .4; }

  #overlayImg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    display: none;
    pointer-events: none;
  }

  .info-bar {
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--muted);
    background: var(--surface);
  }
  .info-item span { color: var(--text); font-family: 'Rajdhani', sans-serif; font-weight: 600; }

  .panel-results {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
  }

  .summary-bar {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .sum-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px;
    border-radius: var(--radius);
    background: var(--surface2);
  }
  .sum-num {
    font-family: 'Rajdhani', sans-serif;
    font-size: 24px;
    font-weight: 700;
    line-height: 1;
  }
  .sum-num.gold  { color: var(--gold); }
  .sum-num.green { color: var(--green); }
  .sum-num.red   { color: var(--red); }
  .sum-lbl { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: .5px; }

  .progress-track {
    margin: 0 16px 10px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--green));
    border-radius: 2px;
    transition: width .5s ease;
    width: 0%;
  }

  .card-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card-list::-webkit-scrollbar { width: 4px; }
  .card-list::-webkit-scrollbar-track { background: transparent; }
  .card-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: var(--radius);
    border-left: 3px solid transparent;
    transition: border-color .2s;
    animation: slideIn .2s ease both;
  }
  @keyframes slideIn {
    from { opacity:0; transform:translateX(8px); }
    to   { opacity:1; transform:translateX(0); }
  }
  .card.done { border-left-color: var(--green); background: linear-gradient(90deg, var(--green-bg), var(--surface2)); }
  .card.todo { border-left-color: var(--red);   background: linear-gradient(90deg, var(--red-bg),   var(--surface2)); }

  .card-icon { font-size: 16px; flex-shrink: 0; }
  .card-body { flex: 1; min-width: 0; }
  .card-name {
    font-size: 13px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-desc {
    font-size: 11px; color: var(--muted); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-prog {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--muted);
    font-size: 13px;
    padding: 20px;
    text-align: center;
  }
  .empty-state .icon { font-size: 32px; opacity: .3; }

  .toast {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    background: #2a1010;
    border: 1px solid var(--red);
    color: var(--red);
    padding: 10px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    display: none;
    z-index: 100;
  }
  .toast.visible { display: block; animation: fadeIn .2s; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>

<header>
  <span class="logo">Achievement Checker</span>
  <div class="header-sep"></div>
  <div class="status-dot" id="statusDot"></div>
  <span class="status-label" id="statusLabel">대기 중</span>
  <button class="btn btn-primary" id="btnStart">📡 화면 공유 시작</button>
  <button class="btn btn-danger" id="btnStop" disabled>■ 중지</button>
  <button class="btn" id="btnSave" style="background:#1a2a1a;color:#3ecf6e;border:1px solid #3ecf6e;">💾 엑셀 저장 (<span id="saveCount">0</span>)</button>
</header>

<div class="panel-preview">
  <div class="panel-title">
    <span>📺</span> 화면 캡처 미리보기
    <span id="previewLabel" style="margin-left:auto;font-size:11px;color:var(--muted)"></span>
  </div>
  <div class="preview-container">
    <div class="preview-placeholder" id="placeholder">
      <span class="icon">🖥️</span>
      <span>화면 공유 시작 후 업적 탭을 보여주세요</span>
    </div>
    <canvas id="previewCanvas"></canvas>
    <img id="overlayImg" alt="overlay">
  </div>
  <div class="info-bar">
    <div class="info-item">프레임: <span id="infoFrame">-</span></div>
    <div class="info-item">변화 감지: <span id="infoChanged">-</span></div>
    <div class="info-item">OCR 시간: <span id="infoOcr">-</span></div>
    <div class="info-item">캐시: <span id="infoCached">-</span></div>
  </div>
</div>

<div class="panel-results">
  <div class="panel-title"><span>🏆</span> 업적 목록</div>
  <div class="summary-bar">
    <div class="sum-block"><span class="sum-num gold" id="sumTotal">0</span><span class="sum-lbl">전체</span></div>
    <div class="sum-block"><span class="sum-num green" id="sumDone">0</span><span class="sum-lbl">달성</span></div>
    <div class="sum-block"><span class="sum-num red" id="sumTodo">0</span><span class="sum-lbl">미달성</span></div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="card-list" id="cardList">
    <div class="empty-state">
      <span class="icon">📋</span>
      <span>화면 공유를 시작하면<br>업적이 자동으로 감지됩니다</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CAPTURE_INTERVAL = 500; // 0.5초 고정

let stream      = null;
let ws          = null;
let animFrame   = null;
let lastCapture = 0;
let frameCount  = 0;
let changeCount = 0;
let cachedCount = 0;

const btnSave    = document.getElementById('btnSave');
const saveCount  = document.getElementById('saveCount');

// 누적 업적 저장소 (이름 기준 중복 제거)
let allAchievements = {};

btnSave.addEventListener('click', downloadExcel);

function accumulateAchievements(achievements) {
  achievements.forEach(a => {
    if (a.name && a.name.trim()) {
      allAchievements[a.name] = a;
    }
  });
  saveCount.textContent = Object.keys(allAchievements).length;
}

function downloadExcel() {
  const rows = Object.values(allAchievements);
  if (!rows.length) { showToast('저장할 업적이 없습니다'); return; }

  // CSV 생성
  const header = ['업적 이름', '설명', '완료 여부', '진행도'];
  const lines  = [header.join(',')];
  rows.forEach(a => {
    const cols = [
      `"${(a.name || '').replace(/"/g, '""')}"`,
      `"${(a.description || '').replace(/"/g, '""')}"`,
      a.completed ? '완료' : '미완료',
      `"${a.progress || ''}"`,
    ];
    lines.push(cols.join(','));
  });

  const bom  = '\uFEFF';  // 한글 깨짐 방지
  const blob = new Blob([bom + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `achievements_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`${rows.length}개 업적 저장 완료`);
}
const video  = document.createElement('video');
const canvas = document.getElementById('previewCanvas');
const ctx    = canvas.getContext('2d');

const btnStart     = document.getElementById('btnStart');
const btnStop      = document.getElementById('btnStop');
const statusDot    = document.getElementById('statusDot');
const statusLabel  = document.getElementById('statusLabel');
const placeholder  = document.getElementById('placeholder');
const overlayImg   = document.getElementById('overlayImg');
const previewLabel = document.getElementById('previewLabel');
const cardList     = document.getElementById('cardList');
const sumTotal     = document.getElementById('sumTotal');
const sumDone      = document.getElementById('sumDone');
const sumTodo      = document.getElementById('sumTodo');
const progressFill = document.getElementById('progressFill');
const infoFrame    = document.getElementById('infoFrame');
const infoChanged  = document.getElementById('infoChanged');
const infoOcr      = document.getElementById('infoOcr');
const infoCached   = document.getElementById('infoCached');
const toast        = document.getElementById('toast');

btnStart.addEventListener('click', async () => {
  try {
    stream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: 5 },
      audio: false,
    });

    video.srcObject = stream;
    await video.play();
    stream.getVideoTracks()[0].addEventListener('ended', stopAll);

    ws = new WebSocket(`ws://${location.host}/ws`);
    ws.onopen    = () => { setStatus('live', '실시간 분석 중'); startLoop(); };
    ws.onmessage = e => handleMessage(JSON.parse(e.data));
    ws.onerror   = () => showToast('WebSocket 오류 발생');
    ws.onclose   = () => { if (stream) setStatus('', '연결 끊김'); };

    placeholder.style.display = 'none';
    canvas.style.display = 'block';
    btnStart.disabled = true;
    btnStop.disabled  = false;

  } catch (err) {
    if (err.name !== 'NotAllowedError')
      showToast('화면 공유 오류: ' + err.message);
  }
});

btnStop.addEventListener('click', stopAll);

function stopAll() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  if (ws)     { ws.close(); ws = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  panelRect = null;
  setStatus('', '중지됨');
  btnStart.disabled = false;
  btnStop.disabled  = true;
  overlayImg.style.display = 'none';
}

// ── 캡처 루프 (requestAnimationFrame + 1초 제한) ──────────────────────────
function startLoop() {
  lastCapture = 0;
  function loop(ts) {
    if (ts - lastCapture >= CAPTURE_INTERVAL) {
      captureFrame();
      lastCapture = ts;
    }
    animFrame = requestAnimationFrame(loop);
  }
  animFrame = requestAnimationFrame(loop);
}

let panelRect = null; // 서버에서 받은 업적창 좌표

function captureFrame() {
  if (!stream || !ws || ws.readyState !== WebSocket.OPEN) return;

  const vw = video.videoWidth  || 1280;
  const vh = video.videoHeight || 720;

  canvas.width  = vw;
  canvas.height = vh;
  ctx.drawImage(video, 0, 0, vw, vh);

  const tc = document.createElement('canvas');

  if (panelRect) {
    // 패널 좌표 알고 있으면 크롭해서 전송
    const { x, y, w, h } = panelRect;
    tc.width  = w;
    tc.height = h;
    tc.getContext('2d').drawImage(video, x, y, w, h, 0, 0, w, h);
    const b64 = tc.toDataURL('image/jpeg', 1.0);
    ws.send(JSON.stringify({ type: 'frame_crop', data: b64 }));
  } else {
    // 패널 좌표 모르면 전체 화면 전송
    const scale = Math.min(1, 1920 / vw);
    tc.width  = Math.round(vw * scale);
    tc.height = Math.round(vh * scale);
    tc.getContext('2d').drawImage(video, 0, 0, tc.width, tc.height);
    const b64 = tc.toDataURL('image/jpeg', 1.0);
    ws.send(JSON.stringify({ type: 'frame_full', data: b64 }));
  }

  frameCount++;
  infoFrame.textContent   = frameCount;
  previewLabel.textContent = `${vw}×${vh}`;
}

function handleMessage(msg) {
  if (msg.type === 'error') { showToast(msg.message); return; }

  // 패널 좌표 수신
  if (msg.type === 'panel_rect') {
    panelRect = { x: msg.x, y: msg.y, w: msg.w, h: msg.h };
    console.log('패널 좌표 수신:', panelRect);
    return;
  }
  if (msg.type === 'panel_not_found') {
    panelRect = null;
    return;
  }

  if (msg.type !== 'result') return;

  if (!msg.cached) {
    changeCount++;
    infoChanged.textContent = changeCount;
    infoOcr.textContent     = msg.elapsed ? msg.elapsed + 's' : '-';
  } else {
    cachedCount++;
  }
  infoCached.textContent = cachedCount;

  if (msg.overlay) {
    overlayImg.src = msg.overlay;
    overlayImg.style.display = 'block';
  }

  renderCards(msg.achievements || [], msg.count || {});
}

function renderCards(achievements, count) {
  accumulateAchievements(achievements);
  const total = count.total ?? achievements.length;
  const done  = count.done  ?? achievements.filter(a => a.completed).length;
  const todo  = total - done;

  sumTotal.textContent = total;
  sumDone.textContent  = done;
  sumTodo.textContent  = todo;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  progressFill.style.width = pct + '%';

  if (!achievements.length) return;

  cardList.innerHTML = '';
  achievements.forEach((a, i) => {
    const card = document.createElement('div');
    card.className = `card ${a.completed ? 'done' : 'todo'}`;
    card.style.animationDelay = i * 40 + 'ms';

    const prog = a.progress ?? '';
    const desc = a.db_match?.description || a.description || '—';

    card.innerHTML = `
      <span class="card-icon">${a.completed ? '✅' : '❌'}</span>
      <div class="card-body">
        <div class="card-name">${esc(a.name || '(인식 실패)')}</div>
        <div class="card-desc">${esc(desc)}</div>
      </div>
      <span class="card-prog">${esc(prog)}</span>
    `;
    cardList.appendChild(card);
  });
}

function setStatus(type, label) {
  statusDot.className   = 'status-dot' + (type ? ' ' + type : '');
  statusLabel.textContent = label;
}

function showToast(msg) {
  toast.textContent = '⚠ ' + msg;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), 3000);
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
